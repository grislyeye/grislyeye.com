name: Check Links

on:
  pull_request:

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323

      - name: List all changed files
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          for file in ${ALL_CHANGED_FILES}; do
            echo "$file was changed"
          done

      - name: Check links for changed files
        id: check-links-changed-files
        uses: lycheeverse/lychee-action@v2
        with:
          args: --root-dir "$(pwd)" --no-progress --exclude-loopback ${{ join(steps.changed-files.outputs.all_changed_files, ' ') }}
          failIfEmpty: false
